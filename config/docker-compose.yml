version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - NOTIFY_WEBHOOK_URL=${NOTIFY_WEBHOOK_URL:-}
    restart: unless-stopped

  wordscheck:
    build: ./wordscheck
    container_name: wordscheck
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  n8n_data:
