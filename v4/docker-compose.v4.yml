version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-v4
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./knowledge:/knowledge
    environment:
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_wechat
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_secret
      - NOTIFY_WEBHOOK_URL=
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: n8n-v4-postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    environment:
      - POSTGRES_DB=n8n_wechat
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n_wechat"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  wordscheck:
    build: ../config/wordscheck
    container_name: n8n-v4-wordscheck
    ports:
      - "8080:8080"
    restart: unless-stopped

  # Qdrant - V2 启用，V1 注释掉
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   container_name: n8n-v4-qdrant
  #   ports:
  #     - "6333:6333"
  #     - "6334:6334"
  #   volumes:
  #     - qdrant_data:/qdrant/storage
  #   restart: unless-stopped

volumes:
  n8n_data:
  pg_data:
  # qdrant_data:
